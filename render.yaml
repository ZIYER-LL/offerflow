services:
  - type: web
    name: offerflow
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        value: file:./data/dev.db
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: offerflow-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
