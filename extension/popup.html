<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfferFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #1e293b;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e2e8f0;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: #3b82f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: #0f172a;
    }

    .header-text p {
      font-size: 12px;
      color: #94a3b8;
    }

    /* Body */
    .body {
      padding: 16px 20px;
    }

    /* No data hint */
    .no-data-hint {
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #92400e;
      display: none;
    }

    .no-data-hint.visible {
      display: block;
    }

    /* Form */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: #ffffff;
    }

    .form-group input[readonly] {
      color: #94a3b8;
      background: #f1f5f9;
      cursor: default;
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .form-row {
      display: flex;
      gap: 10px;
    }

    .form-row .form-group {
      flex: 1;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      outline: none;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      width: 100%;
      background: #3b82f6;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-primary:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast-success {
      background: #ecfdf5;
      color: #065f46;
      border-bottom: 2px solid #10b981;
    }

    .toast-error {
      background: #fef2f2;
      color: #991b1b;
      border-bottom: 2px solid #ef4444;
    }

    /* Settings */
    .settings {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e2e8f0;
    }

    .settings-toggle {
      font-size: 12px;
      color: #64748b;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      user-select: none;
    }

    .settings-toggle:hover {
      color: #3b82f6;
    }

    .settings-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }

    .settings-toggle.open .arrow {
      transform: rotate(90deg);
    }

    .settings-body {
      display: none;
      margin-top: 10px;
    }

    .settings-body.visible {
      display: block;
    }

    .settings-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .settings-row .form-group {
      margin-bottom: 0;
      flex: 1;
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 12px;
      background: #e2e8f0;
      color: #475569;
      white-space: nowrap;
    }

    .btn-sm:hover {
      background: #cbd5e1;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">OF</div>
    <div class="header-text">
      <h1>OfferFlow</h1>
      <p>保存当前岗位信息</p>
    </div>
  </div>

  <!-- Body -->
  <div class="body">
    <!-- No data hint -->
    <div id="noDataHint" class="no-data-hint">
      未检测到岗位信息，请手动填写以下内容。
    </div>

    <!-- Company & Title -->
    <div class="form-row">
      <div class="form-group">
        <label for="company">公司名称</label>
        <input type="text" id="company" placeholder="输入公司名称" />
      </div>
      <div class="form-group">
        <label for="title">岗位名称</label>
        <input type="text" id="title" placeholder="输入岗位名称" />
      </div>
    </div>

    <!-- Location & Source URL -->
    <div class="form-row">
      <div class="form-group">
        <label for="location">工作地点</label>
        <input type="text" id="location" placeholder="输入工作地点" />
      </div>
      <div class="form-group">
        <label for="sourceUrl">来源链接</label>
        <input type="text" id="sourceUrl" readonly placeholder="当前页面 URL" />
      </div>
    </div>

    <!-- JD Snapshot -->
    <div class="form-group">
      <label for="jd">职位描述</label>
      <textarea id="jd" placeholder="粘贴或编辑职位描述..."></textarea>
    </div>

    <!-- Save Button -->
    <button id="saveBtn" class="btn btn-primary">保存岗位</button>

    <!-- Settings -->
    <div class="settings">
      <div id="settingsToggle" class="settings-toggle">
        <span class="arrow">&#9654;</span> 设置
      </div>
      <div id="settingsBody" class="settings-body">
        <div class="settings-row">
          <div class="form-group">
            <label for="apiBaseUrl">API 地址</label>
            <input type="text" id="apiBaseUrl" placeholder="http://localhost:3000" />
          </div>
          <button id="saveSettingsBtn" class="btn btn-sm">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
